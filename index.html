<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basic ADS-B Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; background:#000; }
        #map { height: 100vh; width: 100vw; }
        .status { position: absolute; top: 10px; left: 10px; z-index: 1000; 
            background: rgba(255,255,255,0.9); color: #000; padding: 10px; border-radius: 6px; font-family: system-ui; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="status" id="status">Loading map and aircraft...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([39.5, -84.0], 7); // Ohio area
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let markers = {};

        async function fetchAircraft() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Fetching aircraft...';
            try {
                // Bounding box query for Midwest/Ohio area + in-air flights
                const bboxQuery = encodeURIComponent('{range lat 35 45} {range lon -90 -75} {true inAir}');
                const url = `https://aeroapi.flightaware.com/aeroapi/flights/search/positions?query=${bboxQuery}`;
                
                const response = await fetch(url, {
                    headers: {
                        'x-apikey': 'xZAjHVhmzVTT1AlGPjlbAsGWMaJWTnx0'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Full API response:', data);
                
                const aircraft = data.positions || data.flights || data.results || [];
                console.log(`Total aircraft received: ${aircraft.length}`);

                // Clear old markers
                Object.keys(markers).forEach(key => {
                    markers[key].remove();
                });
                markers = {};

                aircraft.forEach((ac, index) => {
                    const lat = ac.latitude || ac.lat;
                    const lon = ac.longitude || ac.lon;
                    if (!lat || !lon) return;

                    const track = ac.heading || ac.track || 0;
                    const callsign = ac.ident || ac.callsign || ac.flight || 'N/A';

                    const iconHtml = `<div style="transform:rotate(${track}deg); font-size:28px;">✈️</div>`;
                    const icon = L.divIcon({
                        html: iconHtml,
                        iconSize: [36, 36],
                        iconAnchor: [18, 18]
                    });

                    const marker = L.marker([lat, lon], { icon }).addTo(map);
                    markers[index] = marker; // Simple unique key

                    marker.bindPopup(`
                        <b>${callsign}</b><br>
                        Alt: ${ac.altitude || ac.alt_baro || 'N/A'} ft<br>
                        Speed: ${ac.groundspeed || ac.gs || 'N/A'} kts
                    `);
                });

                statusEl.textContent = `Visible: ${aircraft.length} aircraft`;
            } catch (e) {
                console.error('Fetch error:', e);
                statusEl.textContent = 'Error — check console for details';
            }
        }

        setInterval(fetchAircraft, 20000);
        fetchAircraft();
    </script>
</body>
</html>
