<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Military ADS-B Tracker</title>
    
    <link rel="manifest" href="data:application/manifest+json,{
      %22name%22:%22Military%20Tracker%22,
      %22short_name%22:%22MilTrack%22,
      %22start_url%22:%22.%22,
      %22display%22:%22standalone%22,
      %22background_color%22:%22%23000000%22,
      %22theme_color%22:%22%23000000%22,
      %22icons%22:[{%22src%22:%22https://via.placeholder.com/192x192/000/fff?text=%E2%9C%88%EF%B8%8F%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
    }">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: -apple-system, sans-serif; background:#000; color: white; }
        #map { height: 100vh; width: 100vw; }
        .controls {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); padding: 12px; border-radius: 12px; 
        }
        .refresh-btn, button { 
            padding: 10px 16px; background: #007aff; color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px;
        }
        .status { position: absolute; top: 140px; left: 20px; z-index: 1000; 
            background: rgba(255,255,255,0.95); color: #000; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
        label { color: white; margin-left: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="controls">
        <button class="refresh-btn" onclick="fetchData()">Refresh Now</button>
        <label>
            <input type="checkbox" id="militaryOnly" checked onchange="fetchData()">
            Show Only Military
        </label>
    </div>
    <div class="status" id="status">Loading map and aircraft...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bbecquet/Leaflet.RotatedMarker/leaflet.rotatedMarker.js"></script>

    <script>
        const map = L.map('map', { zoomControl: true }).setView([39.5, -84.0], 6); // Ohio centered
        
        // Reliable tiles for iOS
        L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/terrain/{z}/{x}/{y}.jpg', {
            attribution: 'Map tiles by Stamen Design',
            maxZoom: 18
        }).addTo(map);

        let aircraftLayer = L.layerGroup().addTo(map);
        let markers = {};

        async function fetchData() {
            const statusEl = document.getElementById('status');
            const militaryOnly = document.getElementById('militaryOnly').checked;
            statusEl.textContent = 'Fetching aircraft...';
            
            try {
                // Point query: lat, lon, radius in nautical miles (works reliably)
                const response = await fetch('https://api.adsb.lol/v2/point/39.5/-84.0/300');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                const aircraft = data.ac || [];
                console.log(`Aircraft received: ${aircraft.length} (check console for full data)`);

                const currentHexes = new Set(aircraft.map(ac => ac.hex));

                Object.keys(markers).forEach(hex => {
                    if (!currentHexes.has(hex)) {
                        markers[hex].remove();
                        delete markers[hex];
                    }
                });

                let added = 0;
                aircraft.forEach(ac => {
                    const hex = ac.hex;
                    const lat = ac.lat;
                    const lon = ac.lon;
                    if (!lat || !lon || isNaN(lat) || isNaN(lon)) return;

                    const isMilitary = !!(ac.dbFlags && (ac.dbFlags & 1));
                    if (militaryOnly && !isMilitary) return;

                    const track = ac.track || 0;
                    const callsign = ac.flight || ac.callsign || 'N/A';
                    const type = ac.t || 'N/A';
                    const reg = ac.r || 'N/A';
                    const alt = ac.alt_baro !== undefined ? ac.alt_baro : 'N/A';
                    const gs = ac.gs !== undefined ? ac.gs : 'N/A';

                    const iconHtml = `<div style="transform:rotate(${track}deg); font-size:32px; text-shadow:0 0 4px white;">✈️</div>`;
                    const icon = L.divIcon({ 
                        className: '', 
                        html: iconHtml, 
                        iconSize: [40, 40], 
                        iconAnchor: [20, 20] 
                    });

                    let marker = markers[hex];
                    if (!marker) {
                        marker = L.marker([lat, lon], { 
                            icon: icon, 
                            rotationAngle: track, 
                            rotationOrigin: 'center center' 
                        }).addTo(aircraftLayer);
                        markers[hex] = marker;
                        added++;
                    } else {
                        marker.setLatLng([lat, lon]);
                        if (marker.setRotationAngle) marker.setRotationAngle(track);
                    }

                    marker.bindPopup(`
                        <b>${callsign}</b><br>
                        Hex: ${hex}<br>
                        Reg: ${reg}<br>
                        Type: ${type}<br>
                        Alt: ${alt} ft<br>
                        Speed: ${gs} kts<br>
                        Military: ${isMilitary ? 'Yes' : 'No'}
                    `);
                });

                statusEl.textContent = `${militaryOnly ? 'Military' : 'All'} | Visible: ${Object.keys(markers).length}`;
            } catch (err) {
                console.error('Fetch error:', err);
                statusEl.textContent = 'Error fetching data – check internet/console';
            }
        }

        setInterval(fetchData, 15000);
        fetchData(); // Initial load
    </script>
</body>
</html>
