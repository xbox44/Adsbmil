<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Military ADS-B Tracker</title>
    
    <link rel="manifest" href="data:application/manifest+json,{
      %22name%22:%22Military%20Tracker%22,
      %22short_name%22:%22MilTrack%22,
      %22start_url%22:%22.%22,
      %22display%22:%22standalone%22,
      %22background_color%22:%22%23000000%22,
      %22theme_color%22:%22%23000000%22,
      %22icons%22:[{%22src%22:%22https://via.placeholder.com/192x192/000/fff?text=%E2%9C%88%EF%B8%8F%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
    }">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: -apple-system, sans-serif; background:#000; color: white; }
        #map { height: 100vh; width: 100vw; }
        .controls {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
        }
        button, label { margin: 5px; }
        .refresh-btn { padding: 12px 20px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status { position: absolute; top: 160px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.95); color: #000; padding: 10px 14px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="controls">
        <button class="refresh-btn" onclick="fetchData()">Refresh Now</button><br>
        <label>
            <input type="checkbox" id="militaryOnly" checked onchange="fetchData()">
            Show Only Military
        </label>
    </div>
    <div class="status" id="status">Loading map...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bbecquet/Leaflet.RotatedMarker/leaflet.rotatedMarker.js"></script>

    <script>
        const map = L.map('map', { zoomControl: true }).setView([39.5, -84.0], 6); // Ohio centered
        
        // Reliable OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        let aircraftLayer = L.layerGroup().addTo(map);
        let markers = {};

        async function fetchData() {
            const statusEl = document.getElementById('status');
            const militaryOnly = document.getElementById('militaryOnly').checked;
            statusEl.textContent = 'Fetching aircraft...';
            
            try {
                // ADS-B Exchange compatible public API
                const response = await fetch('https://api.adsb.one/v2/point/39.5/-84.0/300');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                const aircraft = data.ac || [];
                console.log(`Aircraft received: ${aircraft.length}`);

                const currentHexes = new Set(aircraft.map(ac => ac.hex));

                Object.keys(markers).forEach(hex => {
                    if (!currentHexes.has(hex)) {
                        markers[hex].remove();
                        delete markers[hex];
                    }
                });

                let added = 0;
                aircraft.forEach(ac => {
                    const hex = ac.hex;
                    const lat = ac.lat;
                    const lon = ac.lon;
                    if (!lat ||
