<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basic ADS-B Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; background:#000; }
        #map { height: 100vh; width: 100vw; }
        .status { position: absolute; top: 10px; left: 10px; z-index: 1000; 
            background: rgba(255,255,255,0.9); color: #000; padding: 10px; border-radius: 6px; font-family: system-ui; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="status" id="status">Loading map and aircraft...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([39.5, -84.0], 7); // Ohio area
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let markers = {};

        async function fetchAircraft() {
            document.getElementById('status').textContent = 'Fetching aircraft...';
            try {
                // FlightAware AeroAPI - search positions in bounding box around Ohio
                const response = await fetch('https://aeroapi.flightaware.com/aeroapi/flights/search/positions?query={true inAir}&max_pages=2', {
                    headers: {
                        'x-apikey': 'xZAjHVhmzVTT1AlGPjlbAsGWMaJWTnx0'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const aircraft = data.positions || data.flights || [];  // Adjust based on actual response
                console.log(`Total aircraft received:`, aircraft.length, data);

                // Clear old markers not in new data (basic cleanup)
                Object.keys(markers).forEach(hex => markers[hex].remove());

                aircraft.forEach(ac => {
                    if (!ac.latitude || !ac.longitude) return;

                    const lat = ac.latitude;
                    const lon = ac.longitude;
                    const track = ac.heading || ac.track || 0;
                    const callsign = ac.ident || ac.callsign || 'N/A';

                    const iconHtml = `<div style="transform:rotate(${track}deg); font-size:28px;">✈️</div>`;
                    const icon = L.divIcon({
                        html: iconHtml,
                        iconSize: [36, 36],
                        iconAnchor: [18, 18]
                    });

                    let marker = L.marker([lat, lon], { icon }).addTo(map);
                    markers[ac.ident || Math.random()] = marker;  // Simple key

                    marker.bindPopup(`
                        <b>${callsign}</b><br>
                        Alt: ${ac.altitude || 'N/A'} ft<br>
                        Speed: ${ac.groundspeed || 'N/A'} kts
                    `);
                });

                document.getElementById('status').textContent = `Visible: ${aircraft.length} aircraft`;
            } catch (e) {
                console.error(e);
                document.getElementById('status').textContent = 'Error — check console for details';
            }
        }

        setInterval(fetchAircraft, 20000); // 20s to respect rate limits
        fetchAircraft();
    </script>
</body>
</html>
