<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ADS-B Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; background:#000; }
        #map { height: 100vh; width: 100vw; }
        .controls {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; color: white;
        }
        .refresh-btn {
            padding: 10px 16px; background: #007aff; color: white; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .status { position: absolute; top: 80px; left: 20px; z-index: 1000; 
            background: rgba(255,255,255,0.9); color: #000; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="controls">
        <button class="refresh-btn" onclick="fetchAircraft()">Refresh Now</button>
    </div>
    <div class="status" id="status">Loading map...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialize map centered on Ohio
        const map = L.map('map').setView([39.5, -84.0], 7);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let aircraftLayer = L.layerGroup().addTo(map);
        let markers = {};

        async function fetchAircraft() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Fetching aircraft...';
            
            try {
                // Wide radius around Ohio - shows many aircraft
                const response = await fetch('https://api.adsb.lol/v2/point/39.5/-84.0/350');
                if (!response.ok) throw new Error('Network issue');
                const data = await response.json();

                const aircraft = data.ac || [];
                console.log(`Total aircraft: ${aircraft.length}`);

                const currentHexes = new Set(aircraft.map(ac => ac.hex));

                // Remove old markers
                Object.keys(markers).forEach(hex => {
                    if (!currentHexes.has(hex)) {
                        markers[hex].remove();
                        delete markers[hex];
                    }
                });

                let added = 0;
                aircraft.forEach(ac => {
                    if (!ac.lat || !ac.lon) return;

                    const track = ac.track || 0;
                    const callsign = ac.flight || ac.callsign || 'N/A';
                    const alt = ac.alt_baro || 'N/A';
                    const gs = ac.gs || 'N/A';

                    const iconHtml = `<div style="transform: rotate(${track}deg); font-size: 28px;">✈️</div>`;
                    const icon = L.divIcon({
                        className: '',
                        html: iconHtml,
                        iconSize: [36, 36],
                        iconAnchor: [18, 18]
                    });

                    let marker = markers[ac.hex];
                    if (!marker) {
                        marker = L.marker([ac.lat, ac.lon], { 
                            icon: icon,
                            rotationAngle: track,
                            rotationOrigin: 'center center'
                        }).addTo(aircraftLayer);
                        markers[ac.hex] = marker;
                        added++;
                    } else {
                        marker.setLatLng([ac.lat, ac.lon]);
                        if (marker.setRotationAngle) marker.setRotationAngle(track);
                    }

                    marker.bindPopup(`
                        <b>${callsign}</b><br>
                        Hex: ${ac.hex}<br>
                        Alt: ${alt} ft<br>
                        Speed: ${gs} kts<br>
                        Heading: ${Math.round(track)}°
                    `);
                });

                statusEl.textContent = `Updated | ${Object.keys(markers).length} aircraft visible`;
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Error loading data – check connection';
            }
        }

        // Auto-refresh every 15 seconds
        setInterval(fetchAircraft, 15000);
        fetchAircraft(); // Initial load
    </script>
</body>
</html>
